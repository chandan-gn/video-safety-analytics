model:
  path: ../models/best.onnx
  confidence_threshold: 0.5
  iou_threshold: 0.4

tracker:
  iou_threshold: 0.4          # min IoU to match detection to existing track
  ema_alpha: 0.7              # smoothing factor (higher = trust new detection more)
  max_frames_lost: 10         # drop track after this many consecutive lost frames
  min_confirmed_ms: 2000      # track must exist this long before rules fire

rules:
  no_hardhat:
    enabled: true
    enter_duration_ms: 1500   # condition must persist this long to trigger violation
    exit_duration_ms: 3000    # condition must be clear this long to deactivate

  no_vest:
    enabled: true
    enter_duration_ms: 1500
    exit_duration_ms: 3000

  forklift_proximity:
    enabled: true
    distance_threshold_px: 150
    enter_duration_ms: 1000
    exit_duration_ms: 2000
